backend:
  name: github
  repo: frknblgn/karavanlibahce
  branch: main

publish_mode: editorial_workflow
media_folder: public/images
public_folder: /images
site_url: https://www.bursakaravanlibahce.com
display_url: https://www.bursakaravanlibahce.com
logo_url: /logo.svg

collections:
  - name: settings
    label: Site Settings
    files:
      - name: site
        label: Business, Images and SEO
        file: src/content/cms/site.json
        format: json
        fields:
          - { label: Site Name, name: name, widget: string }
          - { label: Legal Name, name: legalName, widget: string }
          - { label: Production URL, name: url, widget: string }
          - label: Site Descriptions
            name: description
            widget: object
            fields:
              - { label: Turkish, name: tr, widget: text }
              - { label: English, name: en, widget: text }
          - label: Contact
            name: contact
            widget: object
            fields:
              - { label: Phone Display, name: phone, widget: string }
              - { label: WhatsApp Number, name: whatsapp, widget: string, hint: "Digits only, including country code" }
              - { label: WhatsApp Message, name: whatsappMessage, widget: text }
              - { label: Email, name: email, widget: string }
          - label: Instagram
            name: social
            widget: object
            fields:
              - { label: Instagram Link, name: instagram, widget: string }
              - { label: Instagram Handle, name: instagramHandle, widget: string }
          - label: Address
            name: address
            widget: object
            fields:
              - { label: Display Address, name: full, widget: string }
              - { label: Street, name: street, widget: string, required: false }
              - { label: Locality, name: locality, widget: string }
              - { label: Region, name: region, widget: string }
              - { label: Postal Code, name: postalCode, widget: string }
              - { label: Country Code, name: country, widget: string }
          - label: Coordinates
            name: geo
            widget: object
            fields:
              - { label: Latitude, name: lat, widget: number, value_type: float }
              - { label: Longitude, name: lng, widget: number, value_type: float }
          - { label: Google Maps Link, name: mapsUrl, widget: string }
          - label: Opening Hours
            name: openingHours
            widget: list
            fields:
              - { label: Days, name: days, widget: list, field: { label: Day, name: day, widget: string } }
              - { label: Opens, name: opens, widget: string }
              - { label: Closes, name: closes, widget: string }
          - label: Branding
            name: branding
            widget: object
            fields:
              - { label: Logo, name: logo, widget: image, media_folder: /public/images/logo, public_folder: /images/logo }
          - label: Reviews Summary
            name: reviews
            widget: object
            fields:
              - { label: Show Rating, name: show, widget: boolean }
              - { label: Score, name: score, widget: string, required: false }
              - { label: Review Count, name: count, widget: string, required: false }
          - { label: Default Locale, name: defaultLocale, widget: select, options: [tr, en] }
          - label: Hero Image
            name: hero
            widget: object
            fields:
              - { label: Image, name: image, widget: image, media_folder: /public/images/hero, public_folder: /images/hero }
              - { label: Alt Text, name: alt, widget: string }
          - label: Facilities Image
            name: facilitiesImage
            widget: object
            fields:
              - { label: Image, name: image, widget: image, media_folder: /public/images/facilities, public_folder: /images/facilities }
              - label: Alt Text
                name: alt
                widget: object
                fields:
                  - { label: Turkish, name: tr, widget: string }
                  - { label: English, name: en, widget: string }
          - label: SEO
            name: seo
            widget: object
            fields:
              - label: Default Title
                name: defaultTitle
                widget: object
                fields:
                  - { label: Turkish, name: tr, widget: string }
                  - { label: English, name: en, widget: string }
              - { label: Default Social Image, name: defaultImage, widget: image, media_folder: /public/images/og, public_folder: /images/og }
              - { label: Blog SEO Title, name: blogTitle, widget: string }
              - { label: Blog SEO Description, name: blogDescription, widget: text }

  - name: homepage_text
    label: Homepage Text
    files:
      - name: turkish
        label: Turkish Text
        file: src/content/cms/dictionaries/tr.json
        format: json
        fields: &homepage_fields
          - label: Navigation
            name: nav
            widget: object
            fields:
              - { label: Experience, name: experience, widget: string }
              - { label: Facilities, name: facilities, widget: string }
              - { label: Gallery, name: gallery, widget: string }
              - { label: Pricing, name: pricing, widget: string }
              - { label: Nearby, name: nearby, widget: string }
              - { label: FAQ, name: faq, widget: string }
              - { label: Contact, name: contact, widget: string }
              - { label: Blog, name: blog, widget: string }
              - { label: CTA, name: cta, widget: string }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: text }
              - { label: Subtitle, name: subtitle, widget: text }
              - { label: Primary CTA, name: primaryCta, widget: string }
              - { label: Secondary CTA, name: secondaryCta, widget: string }
              - { label: Scroll Label, name: scroll, widget: string }
              - label: Stats
                name: stats
                widget: list
                fields:
                  - { label: Value, name: value, widget: string }
                  - { label: Label, name: label, widget: string }
          - &heading_section
            label: Experience Section
            name: experience
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: lead, widget: text }
          - <<: *heading_section
            label: Nearby Section
            name: nearby
          - <<: *heading_section
            label: Reviews Section
            name: reviews
          - label: Facilities Section
            name: facilities
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: lead, widget: text }
              - { label: Badge Title, name: badgeTitle, widget: string }
              - { label: Badge Subtitle, name: badgeSub, widget: string }
          - label: Gallery Section
            name: gallery
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: lead, widget: text }
              - { label: CTA, name: cta, widget: string }
          - label: Pricing Section
            name: pricing
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: lead, widget: text }
              - { label: CTA, name: cta, widget: string }
              - { label: Featured Tag, name: tag, widget: string }
              - { label: Note, name: note, widget: text }
          - label: FAQ Section
            name: faq
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Aside Title, name: asideTitle, widget: string }
              - { label: Aside Text, name: asideText, widget: text }
              - { label: Aside CTA, name: asideCta, widget: string }
          - label: Instagram Section
            name: instagram
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
          - label: Contact Section
            name: contact
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: lead, widget: text }
              - { label: Phone Label, name: phone, widget: string }
              - { label: WhatsApp Label, name: whatsapp, widget: string }
              - { label: Address Label, name: address, widget: string }
              - { label: Instagram Label, name: instagram, widget: string }
              - { label: Primary CTA, name: primaryCta, widget: string }
              - { label: Secondary CTA, name: secondaryCta, widget: string }
              - { label: Map Title, name: mapTitle, widget: string }
              - { label: Map Subtitle, name: mapSub, widget: string }
          - label: Footer
            name: footer
            widget: object
            fields:
              - { label: Tagline, name: tagline, widget: string }
              - { label: Rights, name: rights, widget: string }
          - { label: Floating WhatsApp Label, name: whatsappFab, widget: string }
          - label: Blog Index Text
            name: blog
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: lead, widget: text }
              - { label: Read More, name: readMore, widget: string }
              - { label: Back To List, name: backToList, widget: string }
              - { label: Minutes Read, name: minRead, widget: string }
      - name: english
        label: English Text
        file: src/content/cms/dictionaries/en.json
        format: json
        fields: *homepage_fields

  - name: homepage_content
    label: Homepage Cards and Images
    files:
      - name: experiences
        label: Experience Cards
        file: src/content/cms/data/experiences.json
        format: json
        fields:
          - label: Cards
            name: items
            widget: list
            summary: "{{fields.tr.title}}"
            fields: &image_bilingual_card
              - { label: ID, name: id, widget: string }
              - { label: Image, name: image, widget: image, media_folder: /public/images/experience, public_folder: /images/experience }
              - { label: Tone, name: tone, widget: select, options: [sunset, forest, lake, warm, fire, dusk] }
              - label: Turkish
                name: tr
                widget: object
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
              - label: English
                name: en
                widget: object
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
      - name: facilities
        label: Facilities
        file: src/content/cms/data/facilities.json
        format: json
        fields:
          - label: Facilities
            name: items
            widget: list
            summary: "{{fields.tr}}"
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Icon, name: icon, widget: select, options: [bolt, drop, shower, wifi, users, shield, paw, flame] }
              - { label: Turkish, name: tr, widget: string }
              - { label: English, name: en, widget: string }
      - name: gallery
        label: Gallery Images
        file: src/content/cms/data/gallery.json
        format: json
        fields:
          - label: Images
            name: items
            widget: list
            summary: "{{fields.tr}}"
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Image, name: image, widget: image, media_folder: /public/images/gallery, public_folder: /images/gallery }
              - { label: Tone, name: tone, widget: select, options: [sunset, forest, lake, warm, fire, dusk] }
              - { label: Turkish Alt Text, name: tr, widget: string }
              - { label: English Alt Text, name: en, widget: string }
              - { label: Tall Image, name: tall, widget: boolean, required: false }
      - name: nearby
        label: Nearby Attractions
        file: src/content/cms/data/nearby.json
        format: json
        fields:
          - label: Attractions
            name: items
            widget: list
            summary: "{{fields.tr.title}}"
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Image, name: image, widget: image, media_folder: /public/images/nearby, public_folder: /images/nearby }
              - { label: Tone, name: tone, widget: select, options: [sunset, forest, lake, warm, fire, dusk] }
              - { label: Distance, name: distance, widget: string }
              - label: Turkish
                name: tr
                widget: object
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
              - label: English
                name: en
                widget: object
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
      - name: pricing
        label: Pricing and Information Cards
        file: src/content/cms/data/pricing.json
        format: json
        fields:
          - label: Cards
            name: items
            widget: list
            summary: "{{fields.tr.title}}"
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Icon, name: icon, widget: select, options: [caravan, tent, sun] }
              - { label: Featured, name: featured, widget: boolean, required: false }
              - &pricing_locale
                label: Turkish
                name: tr
                widget: object
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Subtitle, name: subtitle, widget: text }
                  - { label: Features, name: features, widget: list, field: { label: Feature, name: feature, widget: string } }
              - <<: *pricing_locale
                label: English
                name: en
      - name: faq
        label: FAQ
        file: src/content/cms/data/faq.json
        format: json
        fields:
          - label: Questions
            name: items
            widget: list
            summary: "{{fields.tr.q}}"
            fields:
              - { label: ID, name: id, widget: string }
              - &faq_locale
                label: Turkish
                name: tr
                widget: object
                fields:
                  - { label: Question, name: q, widget: string }
                  - { label: Answer, name: a, widget: text }
              - <<: *faq_locale
                label: English
                name: en
      - name: instagram_grid
        label: Instagram Grid Images
        file: src/content/cms/data/instagram.json
        format: json
        fields:
          - label: Images
            name: items
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Image, name: image, widget: image, media_folder: /public/images/gallery, public_folder: /images/gallery }
              - { label: Tone, name: tone, widget: select, options: [sunset, forest, lake, warm, fire, dusk] }
      - name: reviews
        label: Reviews
        file: src/content/cms/data/reviews.json
        format: json
        fields:
          - label: Reviews
            name: items
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Name, name: name, widget: string }
              - { label: Avatar Color, name: color, widget: color }
              - label: Role
                name: role
                widget: object
                fields:
                  - { label: Turkish, name: tr, widget: string }
                  - { label: English, name: en, widget: string }
              - label: Review Text
                name: text
                widget: object
                fields:
                  - { label: Turkish, name: tr, widget: text }
                  - { label: English, name: en, widget: text }

  - name: blog
    label: Blog Posts
    label_singular: Blog Post
    folder: src/content/blog
    create: true
    delete: true
    extension: mdx
    format: frontmatter
    identifier_field: slug
    slug: "{{slug}}"
    media_folder: /public/images/blog
    public_folder: /images/blog
    summary: "{{title}} — {{date}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Slug, name: slug, widget: string, pattern: ["^[a-z0-9]+(?:-[a-z0-9]+)*$", "Use lowercase letters, numbers, and hyphens only"], hint: "Stable URL path for the post" }
      - { label: Excerpt, name: description, widget: text }
      - { label: Category, name: category, widget: string }
      - { label: Publish Date, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { label: Cover Image, name: cover, widget: image }
      - { label: Tags, name: tags, widget: list, field: { label: Tag, name: tag, widget: string } }
      - { label: Author, name: author, widget: string }
      - { label: Language, name: lang, widget: select, options: [tr, en] }
      - { label: SEO Title, name: seoTitle, widget: string, required: false }
      - { label: SEO Description, name: seoDescription, widget: text, required: false }
      - { label: Body, name: body, widget: markdown }
